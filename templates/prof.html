<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beristales - Professional Mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .config-bar {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6); 
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            margin: 20px auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 2px solid rgba(255,255,255,0.1);
            padding-right: 15px;
        }
        .config-group:last-child { 
            border-right: none; 
            padding-right: 0; 
            padding-left: 5px; 
        }
        .config-opt {
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 20px; 
            transition: all 0.2s ease;
            background: transparent;
        }
        .config-opt:hover { 
            color: #fff; 
            background: rgba(255, 255, 255, 0.1); 
        }
        .config-opt.active { 
            color: #000; 
            font-weight: 800;
            background: var(--accent-color); 
            box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>
    <script>
        let savedTheme = localStorage.getItem('beristales_theme');
        if (savedTheme === null) savedTheme = ''; 
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

    <div style="position: absolute; top: 30px; right: 40px; display: flex; align-items: center; gap: 15px; z-index: 100; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary)); display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; font-size: 0.8rem;">VB</div>
            <span style="color: white; font-weight: 600; font-size: 0.9rem;">{{ username }}</span>
        </div>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
        <button onclick="openThemeModal()" title="Change Theme" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s;">🎨</button>
    </div>

    <header>
        <a href="/" class="home-btn">← Dashboard</a>
        <h1>Professional Mode</h1>
        <div class="config-bar" id="config-bar">
            <div class="config-group">
                <span class="config-opt active" onclick="setMode('time')">Time</span>
                <span class="config-opt" onclick="setMode('words')">Words</span>
            </div>
            <div class="config-group" id="config-options">
                <span class="config-opt" onclick="setLimit(15)">15</span>
                <span class="config-opt active" onclick="setLimit(30)">30</span>
                <span class="config-opt" onclick="setLimit(60)">60</span>
                <span class="config-opt" onclick="setLimit(120)">120</span>
            </div>
        </div>
        <div id="live-timer" style="font-size: 3rem; color: var(--accent-secondary); font-weight: 800; margin-top: 10px; text-shadow: 0 0 20px rgba(255, 71, 87, 0.4);">30</div>
    </header>

    <div id="prof-panel" class="glass-panel" style="max-width: 1100px;">
        
        <div id="ai-box" style="background: rgba(0,0,0,0.4); border-left: 4px solid var(--accent-color); padding: 15px 25px; text-align: left; margin-bottom: 20px; border-radius: 8px; display: flex; align-items: center;">
            <div style="font-size: 1.5rem; margin-right: 15px;">🤖</div>
            <div>
                <strong style="color: var(--accent-color); font-size: 0.9rem;">BERISTALES PRO</strong>
                <div id="ai-text" style="color: #ccc; font-size: 0.9rem; margin-top: 2px;">Select your challenge. Accuracy is the only metric that matters.</div>
            </div>
        </div>

        <div id="drill-container">
            <div id="drill-text" class="typing-area" style="text-align: left; font-size: 1.8rem;"></div>
        </div>

        <div id="results-panel" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">WPM</span><span id="res-wpm" class="stat-value">0</span></div>
                <div class="stat-card"><span class="stat-label">ACCURACY</span><span id="res-acc" class="stat-value">0%</span></div>
                <div class="stat-card"><span class="stat-label">CONSISTENCY</span><span id="res-con" class="stat-value">0%</span></div>
            </div>
            <div style="height: 250px; margin: 20px 0;">
                <canvas id="wpmChart"></canvas>
            </div>
            <button onclick="restartTest()" class="start-btn">Restart Test (Tab)</button>
        </div>
    </div>

    <div id="theme-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--accent-color);">Select Theme</h2>
            <p style="color: var(--text-dim);">Choose your vibe</p>
            <div class="theme-options">
                <div class="theme-circle" style="background: linear-gradient(135deg, #00f2ff, #0077ff);" onclick="setTheme('')" title="Blue Moon (Default)"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #ffc107, #ff4d4d);" onclick="setTheme('fire')" title="Fiery Red"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #50ff50, #00b860);" onclick="setTheme('venom')" title="Venom"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #e056fd, #be2edd);" onclick="setTheme('nebula')" title="Nebula"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #fff, #555);" onclick="setTheme('phantom')" title="Phantom"></div>
            </div>
            <button class="start-btn" style="margin-top:20px;" onclick="closeThemeModal()">Close</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='prof.js') }}"></script>
    <script>
        const themeModal = document.getElementById('theme-modal');
        function openThemeModal() { 
            const hasTyped = document.querySelectorAll('.correct, .incorrect').length > 0;
            const resultsPanel = document.getElementById('results-panel');
            const isResultsHidden = resultsPanel && resultsPanel.style.display === 'none';
            if (hasTyped && isResultsHidden) return; 
            themeModal.style.display = 'flex'; 
        }
        function closeThemeModal() { themeModal.style.display = 'none'; }
        window.addEventListener('click', function(e) { if(e.target == themeModal) closeThemeModal(); });
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('beristales_theme', theme);
        }
    </script>
</body>
</html>
