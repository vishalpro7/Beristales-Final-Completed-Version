<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beristales - Touch Typing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .hand-guide { display: flex; justify-content: center; gap: 50px; margin-top: 80px; margin-bottom: 30px; opacity: 0; transition: opacity 0.5s; position: relative; z-index: 1; }
        .hand { width: 120px; height: 140px; border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; position: relative; background: rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .finger { position: absolute; bottom: 100%; width: 20px; height: 40px; background: #444; border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 10px 10px 0 0; transition: all 0.15s ease-out; transform-origin: bottom center; }
        .finger.active { background: var(--accent-color); box-shadow: 0 0 20px var(--accent-glow); height: 55px; transform: translateY(-5px); border-color: transparent; z-index: 10; }
        .f-pinky { left: 10px; height: 35px; } .f-ring { left: 35px; height: 50px; } .f-middle { left: 60px; height: 55px; } .f-index { left: 85px; height: 50px; }
        .f-thumb { right: -15px; bottom: 10px; height: 35px; width: 25px; transform: rotate(45deg); top: auto; bottom: 20px; border-radius: 15px; }
        
        /* COMPACT SIDEBAR STYLES */
        .sidebar-mod { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar-mod.completed { opacity: 0.4; border-color: transparent; }
        .sidebar-mod.completed .mod-title-text { text-decoration: line-through; color: #888 !important; }
        .sidebar-mod.active { background: rgba(255,255,255,0.1); border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-glow); transform: scale(1.02); }
        .mod-progress-bg { height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
        .sidebar-mod.active .mod-progress-bg { display: block; }
        .mod-progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.1s linear; box-shadow: 0 0 8px var(--accent-glow); }
        
        .sidebar-mod div { white-space: normal; line-height: 1.3; }
        
        #sidebar-module-list::-webkit-scrollbar { width: 4px; }
        #sidebar-module-list::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }
    </style>
    <script>
        let savedTheme = localStorage.getItem('beristales_theme');
        if (savedTheme === null) savedTheme = ''; 
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div style="position: absolute; top: 30px; right: 40px; display: flex; align-items: center; gap: 15px; z-index: 100; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary)); display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; font-size: 0.8rem;">VB</div>
            <span style="color: white; font-weight: 600; font-size: 0.9rem;">{{ username }}</span>
        </div>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
        <button onclick="openThemeModal()" title="Change Theme" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s;">🎨</button>
    </div>

    <header>
        <a href="/" class="home-btn">← Dashboard</a>
        <h1>Touch Typing</h1>
        <div id="phase-display" style="color: var(--accent-color); font-weight: bold; margin-top: 10px; visibility: hidden;">
            STATUS: <span id="phase-name" style="color: white;">Tutorial</span>
        </div>
    </header>

    <div style="display: flex; justify-content: center; gap: 20px; width: 95%; max-width: 1400px; align-items: stretch; margin: 0 auto; transition: all 0.3s ease;">
        
        <div id="main-panel" class="glass-panel" style="flex: 1 1 auto !important; width: 100% !important; max-width: 1000px !important; margin: 0 !important; transition: all 0.3s ease; box-sizing: border-box;">
            
            <div id="ai-box" style="background: rgba(0,0,0,0.4); border-left: 4px solid var(--accent-color); padding: 20px; text-align: left; margin-bottom: 20px; border-radius: 8px; min-height: 60px; display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; flex: 1;">
                    <div style="font-size: 2rem; margin-right: 15px;">🤖</div>
                    <div>
                        <strong style="color: var(--accent-color); display: block; font-size: 0.9rem;">BERISTALES AI</strong>
                        <span id="ai-text" style="color: #eee; font-style: italic;">Initializing Touch Protocol...</span>
                    </div>
                </div>
                <button id="toggle-sidebar-btn" style="display: none; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='var(--accent-color)'; this.style.color='#000';" onmouseout="this.style.background='transparent'; this.style.color='var(--accent-color)';">Hide Curriculum ⏵</button>
            </div>

            <div id="welcome-screen" style="text-align: center; padding: 40px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none;">
                <div style="font-size: 3rem; margin-bottom: 15px;">👁️‍🗨️</div>
                <p id="persona-text" style="font-size: 1.1rem; color: #ccc; line-height: 1.6; min-height: 60px;"></p>
                <button id="start-baseline-btn" class="start-btn" style="display: none; margin-top: 20px; transition: opacity 0.5s; opacity: 0;">Start Calibration</button>
            </div>

            <div id="drill-container" style="position: relative; z-index: 5; width: 100%;">
                <div id="drill-text" class="typing-area" style="text-align: center; margin: 20px 0; min-height: 120px;"></div>
            </div>

            <div id="guide-wrapper" style="width: 100%;">
                <div id="hand-graphic" class="hand-guide">
                    <div class="hand" id="left-hand">
                        <div class="finger f-pinky" id="f-l-pinky"></div><div class="finger f-ring" id="f-l-ring"></div><div class="finger f-middle" id="f-l-middle"></div><div class="finger f-index" id="f-l-index"></div><div class="finger f-thumb" id="f-l-thumb"></div>
                        <span style="position:absolute; bottom:10px; width:100%; text-align:center; font-size:0.8rem; color:#888;">LEFT</span>
                    </div>
                    <div class="hand" id="right-hand">
                        <div class="finger f-pinky" id="f-r-pinky" style="right:10px; left:auto;"></div><div class="finger f-ring" id="f-r-ring" style="right:35px; left:auto;"></div><div class="finger f-middle" id="f-r-middle" style="right:60px; left:auto;"></div><div class="finger f-index" id="f-r-index" style="right:85px; left:auto;"></div><div class="finger f-thumb" id="f-r-thumb" style="left:-15px; right:auto; transform:rotate(-45deg);"></div>
                        <span style="position:absolute; bottom:10px; width:100%; text-align:center; font-size:0.8rem; color:#888;">RIGHT</span>
                    </div>
                </div>

                <div id="keyboard-wrapper" class="keyboard-container" style="width: 100%;">
                    <p id="guide-text" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">GUIDE: USE THE HIGHLIGHTED FINGER</p>
                    <div class="key-row">
                        <div class="key" id="key-q">q</div><div class="key" id="key-w">w</div><div class="key" id="key-e">e</div><div class="key" id="key-r">r</div><div class="key" id="key-t">t</div>
                        <div class="key" id="key-y">y</div><div class="key" id="key-u">u</div><div class="key" id="key-i">i</div><div class="key" id="key-o">o</div><div class="key" id="key-p">p</div>
                    </div>
                    <div class="key-row">
                        <div class="key" id="key-a">a</div><div class="key" id="key-s">s</div><div class="key" id="key-d">d</div><div class="key" id="key-f">f</div><div class="key" id="key-g">g</div>
                        <div class="key" id="key-h">h</div><div class="key" id="key-j">j</div><div class="key" id="key-k">k</div><div class="key" id="key-l">l</div>
                    </div>
                    <div class="key-row">
                        <div class="key" id="key-z">z</div><div class="key" id="key-x">x</div><div class="key" id="key-c">c</div><div class="key" id="key-v">v</div><div class="key" id="key-b">b</div>
                        <div class="key" id="key-n">n</div><div class="key" id="key-m">m</div>
                    </div>
                    <div class="key-row"><div class="key space" id="key-space">SPACE</div></div>
                </div>
            </div>

            <div id="results-panel" style="display: none; width: 100%;">
                <div class="stats-grid">
                    <div class="stat-card"><span class="stat-label">WPM</span><span id="res-wpm" class="stat-value">0</span></div>
                    <div class="stat-card"><span class="stat-label">ACCURACY</span><span id="res-acc" class="stat-value">0%</span></div>
                </div>
                <div style="height: 200px; margin: 20px 0; width: 100%;"><canvas id="wpmChart"></canvas></div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="view-modules-btn" class="action-btn" style="background: rgba(255,255,255,0.1); border: 1px solid var(--accent-color);">View Curriculum</button>
                    <button id="continue-btn" class="start-btn">Continue</button>
                </div>
            </div>
        </div>

        <div id="sidebar-panel" class="glass-panel" style="flex: 0 0 280px !important; width: 280px !important; max-width: 280px !important; min-width: 280px !important; margin: 0 !important; display: none; flex-direction: column; max-height: 85vh; padding: 20px !important; box-sizing: border-box; transition: all 0.3s ease; overflow: hidden;">
            <h3 style="margin-top: 0; color: var(--accent-color); font-size: 0.9rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; letter-spacing: 1px; text-transform: uppercase;">Curriculum</h3>
            <div id="sidebar-module-list" style="overflow-y: auto; overflow-x: hidden; text-align: left; display: flex; flex-direction: column; padding-right: 5px; flex-grow: 1;"></div>
        </div>

    </div> <div id="module-list-modal" class="modal">
        <div class="modal-content" style="width: 500px; max-height: 80vh; overflow-y: auto;">
            <h2 style="color: var(--accent-color);">Touch Curriculum</h2>
            <div id="module-list-content" style="text-align: left; margin-bottom: 20px;"></div>
            <button onclick="document.getElementById('module-list-modal').style.display='none'" class="start-btn">Close</button>
        </div>
    </div>

    <div id="theme-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--accent-color);">Select Theme</h2>
            <div class="theme-options">
                <div class="theme-circle" style="background: linear-gradient(135deg, #00f2ff, #0077ff);" onclick="setTheme('')" title="Blue Moon (Default)"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #ffc107, #ff4d4d);" onclick="setTheme('fire')" title="Fiery Red"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #50ff50, #00b860);" onclick="setTheme('venom')" title="Venom"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #e056fd, #be2edd);" onclick="setTheme('nebula')" title="Nebula"></div>
                <div class="theme-circle" style="background: linear-gradient(135deg, #fff, #555);" onclick="setTheme('phantom')" title="Phantom"></div>
            </div>
            <button class="start-btn" style="margin-top:20px;" onclick="closeThemeModal()">Close</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='touch.js') }}"></script>
    <script>
        const themeModal = document.getElementById('theme-modal');
        function openThemeModal() { themeModal.style.display = 'flex'; }
        function closeThemeModal() { themeModal.style.display = 'none'; }
        window.addEventListener('click', function(e) { if(e.target == themeModal) closeThemeModal(); });
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('beristales_theme', theme);
        }
    </script>
</body>
</html>
